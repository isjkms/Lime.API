# Lime.Api 운영 — Oracle Cloud VM (ARM Ampere A1)
#
# 본 파일은 Lime.Api/ 디렉토리에 위치. 빌드 컨텍스트는 솔루션 루트(..)로 잡아
# Lime.Shared 등 다른 프로젝트도 함께 빌드 가능하게 한다.
# 향후 Lime.Admin 같은 프로젝트가 추가돼도 그쪽 디렉토리에 별도 compose를 둘 수 있다.
#
# 가정:
#   - Postgres·Redis는 이미 동일 VM에 도커로 떠있음.
#   - 본 compose는 api + caddy 만 새로 띄우고, 기존 컨테이너는 외부 네트워크(`lime-net`)로 연결.
#
# 최초 1회 셋업:
#   docker network create lime-net
#   docker network connect lime-net <기존-postgres-컨테이너명>
#   docker network connect lime-net <기존-redis-컨테이너명>
#
# 사용 (Lime.Api/ 안에서 실행):
#   docker compose --env-file .env up -d --build
#   docker compose pull && docker compose up -d         # 업데이트
#
# .env 예시는 .env.example 참고.

services:
  api:
    build:
      context: ..                       # 솔루션 루트 (Api/) — Lime.Shared 등 함께 보임
      dockerfile: Lime.Api/Dockerfile
    image: lime-api:local
    container_name: lime-api
    restart: unless-stopped
    networks: [lime-net]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      # ↓ 모두 .env에서 주입 (chmod 600)
      Database__Host: ${DB_HOST:-postgres}
      Database__Port: ${DB_PORT:-5432}
      Database__Username: ${DB_USER}
      Database__Password: ${DB_PASS}
      Database__Database: ${DB_NAME:-lime_db}
      Redis__Host: ${REDIS_HOST:-redis}
      Redis__Port: ${REDIS_PORT:-6379}
      Redis__Password: ${REDIS_PASS:-}
      Redis__Database: 0
      Auth__Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Auth__Cookie__Secure: "true"
      Auth__Cookie__SameSite: "Lax"
      Auth__Cookie__Domain: ${COOKIE_DOMAIN}
      Auth__WebBaseUrl: ${WEB_BASE_URL}
      Auth__OAuth__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Auth__OAuth__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Auth__OAuth__Google__RedirectUri: ${GOOGLE_REDIRECT_URI}
      Auth__OAuth__Kakao__ClientId: ${KAKAO_CLIENT_ID}
      Auth__OAuth__Kakao__ClientSecret: ${KAKAO_CLIENT_SECRET}
      Auth__OAuth__Kakao__RedirectUri: ${KAKAO_REDIRECT_URI}
      Auth__OAuth__Naver__ClientId: ${NAVER_CLIENT_ID}
      Auth__OAuth__Naver__ClientSecret: ${NAVER_CLIENT_SECRET}
      Auth__OAuth__Naver__RedirectUri: ${NAVER_REDIRECT_URI}
      Spotify__ClientId: ${SPOTIFY_CLIENT_ID}
      Spotify__ClientSecret: ${SPOTIFY_CLIENT_SECRET}
      S3__AccessKey: ${S3_ACCESS_KEY}
      S3__SecretKey: ${S3_SECRET_KEY}
      S3__EndPointUrl: ${S3_ENDPOINT_URL}
      S3__BucketName: ${S3_BUCKET_NAME}
      S3__PublicUrl: ${S3_PUBLIC_URL}
      S3__Region: ${S3_REGION:-auto}
      S3__ForcePathStyle: ${S3_FORCE_PATH_STYLE:-true}
    expose: ["8080"]
    volumes:
      # ASP.NET Core DataProtection 키 영속화 — 재배포해도 쿠키·세션 유지
      - api_dp_keys:/app/.aspnet/DataProtection-Keys
      # 아바타 로컬 폴백 디렉토리 (S3 사용 시 안 쓰임이지만 안전망)
      - api_uploads:/app/wwwroot/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/db"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    container_name: lime-caddy
    restart: unless-stopped
    networks: [lime-net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started

networks:
  lime-net:
    external: true

volumes:
  caddy_data:
  caddy_config:
  api_dp_keys:
  api_uploads:
